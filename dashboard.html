<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard - Traveloop</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/app.js"></script>
</head>
<body>
  <nav class="nav container">
    <div class="brand">Traveloop</div>
    <ul class="nav-links" id="mainNavLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="destinations.html">Destinations</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Sign In</a></li>
      <li><a href="signup.html">Sign Up</a></li>
    </ul>
  </nav>

  <main class="container">
    <div class="dashboard-header">
      <h1>Travel Dashboard</h1>
      <div class="dashboard-stats">
        <div class="stat-card">
          <div class="stat-icon">🏖️</div>
          <div class="stat-info">
            <h3 id="totalDestinations">8</h3>
            <p>Destinations</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-info">
            <h3 id="totalUsers">1,234</h3>
            <p>Active Users</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✈️</div>
          <div class="stat-info">
            <h3 id="totalTrips">567</h3>
            <p>Trips Planned</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💰</div>
          <div class="stat-info">
            <h3 id="totalRevenue">₹2.5M</h3>
            <p>Revenue</p>
          </div>
        </div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="dashboard-section">
        <h2>Popular Destinations</h2>
        <div class="chart-container">
          <canvas id="destinationsChart"></canvas>
        </div>
      </div>

      <div class="dashboard-section">
        <h2>Recent Bookings</h2>
        <div class="bookings-list" id="recentBookings"></div>
      </div>

      <div class="dashboard-section">
        <h2>Revenue Analytics</h2>
        <div class="chart-container">
          <canvas id="revenueChart"></canvas>
        </div>
      </div>

      <div class="dashboard-section">
        <h2>Quick Actions</h2>
        <div class="actions-grid">
          <button class="action-btn" onclick="addDestination()">
            <span>➕</span> Add Destination
          </button>
          <button class="action-btn" onclick="manageUsers()">
            <span>👥</span> Manage Users
          </button>
          <button class="action-btn" onclick="viewReports()">
            <span>📊</span> View Reports
          </button>
          <button class="action-btn" onclick="settings()">
            <span>⚙️</span> Settings
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadDashboard();
      createCharts();
    });

    function loadDashboard() {
      loadRecentBookings();
      updateStats();
    }

    function loadRecentBookings() {
      const bookings = [
        { user: 'John Doe', destination: 'Goa', amount: '₹15,000', date: '2024-01-15' },
        { user: 'Jane Smith', destination: 'Manali', amount: '₹12,500', date: '2024-01-14' },
        { user: 'Mike Johnson', destination: 'Kerala', amount: '₹18,000', date: '2024-01-13' }
      ];

      const container = document.getElementById('recentBookings');
      container.innerHTML = bookings.map(booking => `
        <div class="booking-item">
          <div class="booking-info">
            <strong>${booking.user}</strong>
            <p>${booking.destination} - ${booking.amount}</p>
          </div>
          <div class="booking-date">${booking.date}</div>
        </div>
      `).join('');
    }

    function createCharts() {
      // Simple chart simulation
      const ctx1 = document.getElementById('destinationsChart');
      const ctx2 = document.getElementById('revenueChart');
      
      if (ctx1) {
        ctx1.style.background = 'linear-gradient(45deg, #3b82f6, #06b6d4)';
        ctx1.style.borderRadius = '8px';
      }
      
      if (ctx2) {
        ctx2.style.background = 'linear-gradient(45deg, #10b981, #059669)';
        ctx2.style.borderRadius = '8px';
      }
    }

    function addDestination() {
      alert('Add Destination feature - Coming Soon!');
    }

    function manageUsers() {
      alert('User Management feature - Coming Soon!');
    }

    function viewReports() {
      alert('Reports feature - Coming Soon!');
    }

    function settings() {
      alert('Settings feature - Coming Soon!');
    }
  </script>
</body>
</html>
